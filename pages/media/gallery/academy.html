// 전역 변수 선언
let psacGalleryData = [];
let relaySchoolGalleryData = [];
let GOOGLE_APPS_SCRIPT_URL = null; // 동적으로 로드될 URL

// Apps Script URL을 동적으로 가져오기
async function getAppsScriptUrl() {
    if (GOOGLE_APPS_SCRIPT_URL) {
        return GOOGLE_APPS_SCRIPT_URL; // 이미 로드된 경우 캐시된 값 사용
    }

    try {
        // YPP Config가 로드되어 있는지 확인
        if (!window.YPPConfig) {
            throw new Error('YPP Config가 로드되지 않았습니다.');
        }

        // Media Academy 페이지 Apps Script URL 가져오기
        GOOGLE_APPS_SCRIPT_URL = await window.YPPConfig.get('MEDIA_ACADEMY');
        console.log('✅ Media Academy Apps Script URL 로드 완료:', GOOGLE_APPS_SCRIPT_URL);
        return GOOGLE_APPS_SCRIPT_URL;
    } catch (error) {
        console.error('💥 Media Academy Apps Script URL 로드 실패:', error);
        throw error; // 에러를 상위로 전파
    }
}

async function loadGalleryDataFromSheets() {
    try {
        console.log('📊 Google Sheets에서 갤러리 데이터 로드 시작...');
        
        // 동적으로 Apps Script URL 가져오기
        const baseUrl = await getAppsScriptUrl();
        console.log('🔗 API 호출 URL:', `${baseUrl}?sheet=SHEET_GAL_F&action=getData`);
        
        const response = await fetch(`${baseUrl}?sheet=SHEET_GAL_F&action=getData`);
        console.log('📡 HTTP 응답 상태:', response.status, response.statusText);
        
        if (!response.ok) {
            throw new Error(`HTTP 오류: ${response.status} ${response.statusText}`);
        }
        
        const result = await response.json();
        console.log('📋 API 응답 전체:', result);
        console.log('✅ API 응답 성공 여부:', result.success);
        
        if (result.success) {
            console.log(`✅ 총 ${result.data.length}개의 데이터를 성공적으로 로드했습니다.`);
            
            // 데이터 전처리: 이미지 필드 안전하게 파싱
            const processedData = result.data.map(item => {
                // 이미지 필드 처리
                if (item.image) {
                    if (typeof item.image === 'string') {
                        try {
                            // JSON 배열 문자열인 경우 파싱
                            if (item.image.trim().startsWith('[')) {
                                item.image = JSON.parse(item.image);
                            } else {
                                // 일반 문자열인 경우 배열로 변환
                                item.image = [item.image];
                            }
                        } catch (e) {
                            console.warn('이미지 파싱 실패:', item.image, e);
                            item.image = [];
                        }
                    }
                    
                    // 배열이 아닌 경우 배열로 변환
                    if (!Array.isArray(item.image)) {
                        item.image = [item.image];
                    }
                    
                    // 빈 URL 제거
                    item.image = item.image.filter(url => url && url.trim() !== '');
                } else {
                    item.image = [];
                }
                
                return item;
            });
            
            // 카테고리별로 데이터 분리 (Google Sheets의 row 순서 그대로 사용)
            psacGalleryData = processedData.filter(item => 
                item.category && item.category.toLowerCase() === 'psac'
            );
            
            relaySchoolGalleryData = processedData.filter(item => 
                item.category && item.category.toLowerCase() === 'relay school'
            );
            
            console.log(`📋 PSAC 갤러리: ${psacGalleryData.length}개`);
            console.log(`📋 Relay School 갤러리: ${relaySchoolGalleryData.length}개`);
            
            // 이미지 데이터 디버깅
            console.log('🖼️ 이미지 데이터 샘플:');
            [...psacGalleryData, ...relaySchoolGalleryData].slice(0, 3).forEach((item, index) => {
                console.log(`${index + 1}. 제목: ${item.titleKR}`);
                console.log(`   이미지 타입: ${typeof item.image}, 배열여부: ${Array.isArray(item.image)}`);
                console.log(`   이미지 개수: ${item.image ? item.image.length : 0}`);
                if (item.image && item.image.length > 0) {
                    console.log(`   첫 번째 이미지: ${item.image[0].substring(0, 100)}...`);
                }
            });
            
            // 날짜 정보 디버깅
            console.log('PSAC 갤러리 날짜 정보:');
            psacGalleryData.forEach((item, index) => {
                console.log(`${index + 1}. ID: ${item.id}, Date: ${item.date}, Created: ${item.created_at}, Title: ${item.titleKR}`);
            });
            
            console.log('Relay School 갤러리 날짜 정보:');
            relaySchoolGalleryData.forEach((item, index) => {
                console.log(`${index + 1}. ID: ${item.id}, Date: ${item.date}, Created: ${item.created_at}, Title: ${item.titleKR}`);
            });

            return true;
        } else {
            console.error('❌ API 응답 실패:', result);
            throw new Error(`API 오류: ${result.error || result.message || '알 수 없는 오류'}`);
        }
        
    } catch (error) {
        console.error('💥 갤러리 데이터 로드 실패:', error);
        console.error('🔍 오류 상세:', {
            name: error.name,
            message: error.message,
            stack: error.stack
        });
        
        // 오류 발생 시 빈 배열로 초기화
        psacGalleryData = [];
        relaySchoolGalleryData = [];
        return false;
    }
}
// Gallery Modal Manager
class GalleryModalManager {
    constructor() {
        this.currentController = null;
        this.isInitialized = false;
        this.setupModal();
    }

    setCurrentController(controller) {
        this.currentController = controller;
    }

    setupModal() {
        if (this.isInitialized) return;
        
        const modal = document.getElementById('imageModal');
        const closeBtn = document.querySelector('.close-modal');
        const prevBtn = document.getElementById('prevImage');
        const nextBtn = document.getElementById('nextImage');
        const imageContainer = document.getElementById('image-container');
        const leftTouchArea = document.querySelector('.left-touch');
        const rightTouchArea = document.querySelector('.right-touch');

        // Touch/Drag variables
        let startX = 0;
        let startY = 0;
        let isDragging = false;
        let dragThreshold = 50;

        // Close modal
        closeBtn.addEventListener('click', () => {
            if (this.currentController) this.currentController.closeModal();
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal && this.currentController) {
                this.currentController.closeModal();
            }
        });

        // Navigation buttons
        prevBtn.addEventListener('click', () => {
            if (this.currentController) this.currentController.showPreviousImage();
        });

        nextBtn.addEventListener('click', () => {
            if (this.currentController) this.currentController.showNextImage();
        });

        // Touch area clicks
        leftTouchArea.addEventListener('click', () => {
            if (this.currentController) this.currentController.showPreviousImage();
        });

        rightTouchArea.addEventListener('click', () => {
            if (this.currentController) this.currentController.showNextImage();
        });

        // Touch events
        imageContainer.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            isDragging = true;
        }, { passive: true });

        imageContainer.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
        }, { passive: false });

        imageContainer.addEventListener('touchend', (e) => {
            if (!isDragging || !this.currentController) return;
            
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const diffX = startX - endX;
            const diffY = startY - endY;

            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > dragThreshold) {
                if (diffX > 0) {
                    this.currentController.showNextImage();
                } else {
                    this.currentController.showPreviousImage();
                }
            }
            
            isDragging = false;
        }, { passive: true });

        // Mouse drag events
        imageContainer.addEventListener('mousedown', (e) => {
            startX = e.clientX;
            startY = e.clientY;
            isDragging = true;
            imageContainer.style.cursor = 'grabbing';
        });

        imageContainer.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
        });

        imageContainer.addEventListener('mouseup', (e) => {
            if (!isDragging || !this.currentController) return;
            
            const endX = e.clientX;
            const endY = e.clientY;
            const diffX = startX - endX;
            const diffY = startY - endY;

            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > dragThreshold) {
                if (diffX > 0) {
                    this.currentController.showNextImage();
                } else {
                    this.currentController.showPreviousImage();
                }
            }
            
            isDragging = false;
            imageContainer.style.cursor = 'grab';
        });

        imageContainer.addEventListener('mouseleave', () => {
            isDragging = false;
            imageContainer.style.cursor = 'grab';
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (modal.style.display === 'block' && this.currentController) {
                if (e.key === 'Escape') {
                    this.currentController.closeModal();
                } else if (e.key === 'ArrowLeft') {
                    this.currentController.showPreviousImage();
                } else if (e.key === 'ArrowRight') {
                    this.currentController.showNextImage();
                }
            }
        });

        this.isInitialized = true;
    }
}

// Gallery Controller Class
class PSACGalleryController {
    constructor(data, containerId, itemsPerPage = 12) {
        // PSAC도 데이터를 역순으로 정렬 (최신순)
        this.data = data.filter(item => item.state === "on").reverse();
        this.container = document.getElementById(containerId);
        this.itemsPerPage = itemsPerPage;
        this.currentPage = 1;
        this.totalPages = Math.ceil(this.data.length / this.itemsPerPage);
        this.currentModal = null;
        this.currentImageIndex = 0;
        
        this.init();
    }

    init() {
        this.renderGallery();
        this.renderPagination();
        this.setupModal();
    }

    renderGallery() {
        const startIndex = (this.currentPage - 1) * this.itemsPerPage;
        const endIndex = startIndex + this.itemsPerPage;
        const currentItems = this.data.slice(startIndex, endIndex);

        const galleryGrid = document.getElementById('psac-gallery-grid');
        galleryGrid.innerHTML = '';

        currentItems.forEach(item => {
            // 이미지가 있는 경우에만 갤러리 아이템 생성
            if (!item.image || item.image.length === 0) {
                console.warn('이미지가 없는 항목 건너뛰기:', item.titleKR || item.id);
                return;
            }
            
            const galleryItem = document.createElement('div');
            galleryItem.className = 'gallery-item';
            
            const thumbnailImage = item.image[0];                    
            galleryItem.innerHTML = `
                <div class="gallery-thumbnail" data-id="${item.id}">
                    <img src="${thumbnailImage}" alt="${item.titleKR || '이미지'}" loading="lazy" 
                         onerror="this.src='/assets/images/placeholder.jpg'; console.warn('이미지 로드 실패:', '${thumbnailImage}');">
                    <div class="gallery-overlay">
                        <div class="gallery-info">
                            <h4 class="gallery-title" data-eng="${item.titleEN || ''}" data-kor="${item.titleKR || ''}">${item.titleKR || '제목 없음'}</h4>
                        </div>
                    </div>
                </div>
                `;
                            // <p class="gallery-date">${this.formatDate(item.date)}</p>

            galleryItem.addEventListener('click', () => {
                this.openModal(item);
            });

            galleryGrid.appendChild(galleryItem);
        });
    }

    renderPagination() {
        const paginationContainer = document.getElementById('psac-pagination');
        paginationContainer.innerHTML = '';

        if (this.totalPages <= 1) return;

        const pagination = document.createElement('div');
        pagination.className = 'pagination';

        // Previous button
        if (this.currentPage > 1) {
            const prevBtn = document.createElement('button');
            prevBtn.className = 'pagination-btn';
            prevBtn.innerHTML = '&lt;';
            prevBtn.addEventListener('click', () => {
                this.currentPage--;
                this.renderGallery();
                this.renderPagination();
            });

document.addEventListener('DOMContentLoaded', async function() {
    const navLinks = document.querySelectorAll('.section-nav-link');
    const sections = [
        document.getElementById('relay-school'),
        document.getElementById('psac')
    ];

    function onScrollSpy() {
        let currentId = '';
        sections.forEach(section => {
            if (!section) return;
            const rect = section.getBoundingClientRect();
            if (rect.top <= 120 && rect.bottom > 120) {
                currentId = section.id;
            }
        });

        navLinks.forEach(link => {
            link.classList.toggle('active', link.getAttribute('href') === `#${currentId}`);
        });
    }

    window.addEventListener('scroll', onScrollSpy);
    onScrollSpy(); // 초기화

    // YPP Config 및 컴포넌트 로딩 확인
    const initWhenReady = async () => {
        if (window.YPPConfig) {
            try {
                // Google Sheets에서 데이터 로드
                const success = await loadGalleryDataFromSheets();
                
                if (success) {
                    // 기존 갤러리 컨트롤러 초기화
                    new PSACGalleryController(psacGalleryData, 'psac-gallery');
                    new RelaySchoolGalleryController(relaySchoolGalleryData, 'relay-school-gallery', 12);
                } else {
                    console.error('갤러리 데이터 로드 실패로 빈 갤러리를 표시합니다.');
                    // 실패해도 빈 배열로 갤러리 초기화
                    new PSACGalleryController([], 'psac-gallery');
                    new RelaySchoolGalleryController([], 'relay-school-gallery', 12);
                }
                return true;
            } catch (error) {
                console.error('Academy 갤러리 초기화 실패:', error);
                new PSACGalleryController([], 'psac-gallery');
                new RelaySchoolGalleryController([], 'relay-school-gallery', 12);
                return true;
            }
        }
        return false;
    };

    // 즉시 확인
    if (!(await initWhenReady())) {
        // 주기적 확인
        const checkReady = setInterval(async () => {
            if (await initWhenReady()) {
                clearInterval(checkReady);
            }
        }, 100);
        
        // 타임아웃 설정 (5초 후 강제 초기화)
        setTimeout(() => {
            clearInterval(checkReady);
            console.warn('YPP Config 로드 대기 시간 초과, 빈 갤러리로 초기화');
            new PSACGalleryController([], 'psac-gallery');
            new RelaySchoolGalleryController([], 'relay-school-gallery', 12);
        }, 5000);
    }
});
