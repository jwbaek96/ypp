    <!-- Inside Gallery Script -->
    <script>

// 전역 변수 선언
let insideGalleryData = [];
let GOOGLE_APPS_SCRIPT_URL = null; // 동적으로 로드될 URL

// Apps Script URL을 동적으로 가져오기
async function getAppsScriptUrl() {
    if (GOOGLE_APPS_SCRIPT_URL) {
        return GOOGLE_APPS_SCRIPT_URL; // 이미 로드된 경우 캐시된 값 사용
    }

    try {
        // YPP Config가 로드되어 있는지 확인
        if (!window.YPPConfig) {
            throw new Error('YPP Config가 로드되지 않았습니다.');
        }

        // Media Inside 페이지 Apps Script URL 가져오기
        GOOGLE_APPS_SCRIPT_URL = await window.YPPConfig.get('MEDIA_INSIDE');
        console.log('✅ Media Inside Apps Script URL 로드 완료:', GOOGLE_APPS_SCRIPT_URL);
        return GOOGLE_APPS_SCRIPT_URL;
    } catch (error) {
        console.error('💥 Media Inside Apps Script URL 로드 실패:', error);
        throw error; // 에러를 상위로 전파
    }
}

async function loadGalleryDataFromSheets() {
    try {
        console.log('📊 Google Sheets에서 갤러리 데이터 로드 시작...');
        
        // 동적으로 Apps Script URL 가져오기
        const baseUrl = await getAppsScriptUrl();
        const response = await fetch(`${baseUrl}?sheet=SHEET_GAL_C&action=getData`);
        const result = await response.json();
        
        if (result.success) {
            console.log(`✅ 총 ${result.data.length}개의 데이터를 성공적으로 로드했습니다.`);
            
            // 모든 데이터 사용 (카테고리 필터링 제거)
            insideGalleryData = result.data.reverse();
            
            console.log(`📋 Inside 갤러리: ${insideGalleryData.length}개`);
            console.log(insideGalleryData);

            return true;
        } else {
            throw new Error(`API 오류: ${result.message || result.error || '알 수 없는 오류'}`);
        }
        
    } catch (error) {
        console.error('💥 갤러리 데이터 로드 실패:', error);
        // 오류 발생 시 빈 배열로 초기화
        insideGalleryData = [];
        return false;
    }
}

// Inside Gallery Controller Class
class InsideGalleryController {
    constructor(data, containerId, itemsPerPage = 12) {
        this.data = data.filter(item => item.state === "on");
        this.container = document.getElementById(containerId);
        this.itemsPerPage = itemsPerPage;
        this.currentPage = 1;
        this.totalPages = Math.ceil(this.data.length / this.itemsPerPage);
        this.currentModal = null;
        this.currentImageIndex = 0;
        
        this.init();
    }

    init() {
        this.renderGallery();
        this.renderPagination();
        this.setupModal();
    }

    renderGallery() {
        const startIndex = (this.currentPage - 1) * this.itemsPerPage;
        const endIndex = startIndex + this.itemsPerPage;
        const currentItems = this.data.slice(startIndex, endIndex);

        const galleryGrid = document.getElementById('inside-gallery-grid');
        galleryGrid.innerHTML = '';

        currentItems.forEach(item => {
            const galleryItem = document.createElement('div');
            galleryItem.className = 'gallery-item';
            const formatDate = this.formatDate(item.date);
            const thumbnailImage = item.image[0];                    
            galleryItem.innerHTML = `
                <div class="gallery-thumbnail" data-id="${item.id}">
                    <img src="${thumbnailImage}" alt="${item.titleKR}" loading="lazy">
                    <div class="gallery-overlay">
                        <div class="gallery-info">
                            <h4 class="gallery-title" data-eng="${item.titleEN}" data-kor="${item.titleKR}">${item.titleKR}</h4>
                            <p class="gallery-date">${formatDate}</p>
                        </div>
                    </div>
                </div>
            `;

            galleryItem.addEventListener('click', () => {
                this.openModal(item);
            });

            galleryGrid.appendChild(galleryItem);
        });
    }

    renderPagination() {
        const paginationContainer = document.getElementById('inside-pagination');
        paginationContainer.innerHTML = '';

        if (this.totalPages <= 1) return;

        const pagination = document.createElement('div');
        pagination.className = 'pagination';

        // Previous button
        if (this.currentPage > 1) {
            const prevBtn = document.createElement('button');
            prevBtn.className = 'pagination-btn';
            prevBtn.innerHTML = '&lt;';
            prevBtn.addEventListener('click', () => {
                this.currentPage--;
                this.renderGallery();
                this.renderPagination();
            });
            pagination.appendChild(prevBtn);
        }

        // Page numbers
        for (let i = 1; i <= this.totalPages; i++) {
            const pageBtn = document.createElement('button');
            pageBtn.className = `pagination-btn ${i === this.currentPage ? 'active' : ''}`;
            pageBtn.textContent = i;
            pageBtn.addEventListener('click', () => {
                this.currentPage = i;
                this.renderGallery();
                this.renderPagination();
            });
            pagination.appendChild(pageBtn);
        }

        // Next button
        if (this.currentPage < this.totalPages) {
            const nextBtn = document.createElement('button');
            nextBtn.className = 'pagination-btn';
            nextBtn.innerHTML = '&gt;';
            nextBtn.addEventListener('click', () => {
                this.currentPage++;
                this.renderGallery();
                this.renderPagination();
            });
            pagination.appendChild(nextBtn);
        }

        paginationContainer.appendChild(pagination);
    }

    setupModal() {
        const modal = document.getElementById('imageModal');
        const closeBtn = document.querySelector('.close-modal');
        const prevBtn = document.getElementById('prevImage');
        const nextBtn = document.getElementById('nextImage');
        const imageContainer = document.getElementById('image-container');
        const leftTouchArea = document.querySelector('.left-touch');
        const rightTouchArea = document.querySelector('.right-touch');

        // Touch/Drag variables
        let startX = 0;
        let startY = 0;
        let isDragging = false;
        let dragThreshold = 50;

        // Close modal
        closeBtn.addEventListener('click', () => {
            this.closeModal();
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                this.closeModal();
            }
        });

        // Navigation buttons
        prevBtn.addEventListener('click', () => {
            this.showPreviousImage();
        });

        nextBtn.addEventListener('click', () => {
            this.showNextImage();
        });

        // Touch area clicks
        leftTouchArea.addEventListener('click', () => {
            this.showPreviousImage();
        });

        rightTouchArea.addEventListener('click', () => {
            this.showNextImage();
        });

        // Touch events for mobile
        imageContainer.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            isDragging = true;
        }, { passive: true });

        imageContainer.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
        }, { passive: false });

        imageContainer.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const diffX = startX - endX;
            const diffY = startY - endY;

            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > dragThreshold) {
                if (diffX > 0) {
                    this.showNextImage();
                } else {
                    this.showPreviousImage();
                }
            }
            
            isDragging = false;
        }, { passive: true });

        // Mouse drag events for desktop
        imageContainer.addEventListener('mousedown', (e) => {
            startX = e.clientX;
            startY = e.clientY;
            isDragging = true;
            imageContainer.style.cursor = 'grabbing';
        });

        imageContainer.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
        });

        imageContainer.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            
            const endX = e.clientX;
            const endY = e.clientY;
            const diffX = startX - endX;
            const diffY = startY - endY;

            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > dragThreshold) {
                if (diffX > 0) {
                    this.showNextImage();
                } else {
                    this.showPreviousImage();
                }
            }
            
            isDragging = false;
            imageContainer.style.cursor = 'grab';
        });

        imageContainer.addEventListener('mouseleave', () => {
            isDragging = false;
            imageContainer.style.cursor = 'grab';
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (modal.style.display === 'block') {
                if (e.key === 'Escape') {
                    this.closeModal();
                } else if (e.key === 'ArrowLeft') {
                    this.showPreviousImage();
                } else if (e.key === 'ArrowRight') {
                    this.showNextImage();
                }
            }
        });
    }

    openModal(item) {
        this.currentModal = item;
        this.currentImageIndex = 0;
        
        const modal = document.getElementById('imageModal');
        const modalTitle = document.getElementById('modal-title');
        const modalDate = document.getElementById('modal-date');
        const modalDescription = document.getElementById('modal-description');
        const totalImages = document.getElementById('total-images');

        modalTitle.textContent = item.titleKR;
        modalTitle.setAttribute('data-eng', item.titleEN);
        modalTitle.setAttribute('data-kor', item.titleKR);
        modalDate.textContent = this.formatDate(item.date);
        
        // 모달 설명에 한영 어트리뷰트 설정
        modalDescription.textContent = item.textKR || item.text || '';
        modalDescription.setAttribute('data-eng', item.textEN || item.text || '');
        modalDescription.setAttribute('data-kor', item.textKR || item.text || '');
        
        totalImages.textContent = item.image.length;

        // 로컬스토리지 기반 한영 전환 설정
        this.setupModalLanguageToggle();

        this.updateModalImage();
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    // 모달 한영 전환 설정
    setupModalLanguageToggle() {
        const modalTitle = document.getElementById('modal-title');
        const modalDescription = document.getElementById('modal-description');
        
        const updateModalLanguage = () => {
            const selectedLanguage = localStorage.getItem('selectedLanguage') || 'kr';
            const isEnglish = selectedLanguage === 'en';
            
            // 제목 변경
            const titleKor = modalTitle.getAttribute('data-kor');
            const titleEng = modalTitle.getAttribute('data-eng');
            
            if (isEnglish && titleEng) {
                modalTitle.textContent = titleEng;
            } else if (titleKor) {
                modalTitle.textContent = titleKor;
            }
            
            // 설명 변경
            const descKor = modalDescription.getAttribute('data-kor');
            const descEng = modalDescription.getAttribute('data-eng');
            
            if (isEnglish && descEng) {
                modalDescription.textContent = descEng;
            } else if (descKor) {
                modalDescription.textContent = descKor;
            }
        };
        
        // 초기 언어 설정 적용
        updateModalLanguage();
        
        // 언어 변경 이벤트 리스너
        const handleLanguageChange = () => {
            updateModalLanguage();
        };
        
        document.addEventListener('languageChanged', handleLanguageChange);
        
        // 로컬스토리지 변경 감지
        const handleStorageChange = (e) => {
            if (e.key === 'selectedLanguage') {
                updateModalLanguage();
            }
        };
        
        window.addEventListener('storage', handleStorageChange);
        
        // 모달 닫을 때 정리할 수 있도록 저장
        this.modalLanguageHandler = handleLanguageChange;
        this.modalStorageHandler = handleStorageChange;
    }

    closeModal() {
        const modal = document.getElementById('imageModal');
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
        this.currentModal = null;
        
        // 모달 언어 이벤트 리스너 정리
        if (this.modalLanguageHandler) {
            document.removeEventListener('languageChanged', this.modalLanguageHandler);
            this.modalLanguageHandler = null;
        }
        if (this.modalStorageHandler) {
            window.removeEventListener('storage', this.modalStorageHandler);
            this.modalStorageHandler = null;
        }
    }

    showPreviousImage() {
        if (this.currentModal && this.currentImageIndex > 0) {
            this.currentImageIndex--;
            this.updateModalImage();
        }
    }

    showNextImage() {
        if (this.currentModal && this.currentImageIndex < this.currentModal.image.length - 1) {
            this.currentImageIndex++;
            this.updateModalImage();
        }
    }

    updateModalImage() {
        if (!this.currentModal) return;

        const modalImage = document.getElementById('modal-image');
        const currentImageSpan = document.getElementById('current-image');
        
        modalImage.src = this.currentModal.image[this.currentImageIndex];
        modalImage.alt = this.currentModal.titleKR;
        currentImageSpan.textContent = this.currentImageIndex + 1;

        // Update navigation buttons state
        const prevBtn = document.getElementById('prevImage');
        const nextBtn = document.getElementById('nextImage');
        
        prevBtn.style.display = 'flex';
        nextBtn.style.display = 'flex';
        
        prevBtn.disabled = this.currentImageIndex === 0;
        nextBtn.disabled = this.currentImageIndex === this.currentModal.image.length - 1;
        
        if (this.currentModal.image.length <= 1) {
            prevBtn.style.display = 'none';
            nextBtn.style.display = 'none';
        }
    }

    formatDate(dateString) {
        // ISO 날짜 형태인지 먼저 확인 (T나 Z가 포함되어 있으면 ISO 형태)
        if (typeof dateString === 'string' && (dateString.includes('T') || dateString.includes('Z'))) {
            try {
                const date = new Date(dateString);
                if (!isNaN(date.getTime())) {
                    return date.toISOString().split('T')[0]; // YYYY-MM-DD 형태로 변환
                }
            } catch (error) {
                return dateString;
            }
        }
        
        // 그 외의 경우는 모두 텍스트로 간주하여 그대로 반환
        return dateString;
    }
}

// 기존 DOMContentLoaded 이벤트를 수정
document.addEventListener('DOMContentLoaded', async function() {
    // YPP Config 및 컴포넌트 로딩 확인
    const initWhenReady = async () => {
        if (window.YPPConfig) {
            try {
                // Google Sheets에서 데이터 로드
                const success = await loadGalleryDataFromSheets();
                
                if (success) {
                    // Inside 갤러리 컨트롤러 초기화
                    new InsideGalleryController(insideGalleryData, 'inside-gallery-section');
                } else {
                    console.error('갤러리 데이터 로드 실패로 빈 갤러리를 표시합니다.');
                    // 실패해도 빈 배열로 갤러리 초기화
                    new InsideGalleryController([], 'inside-gallery-section');
                }
                return true;
            } catch (error) {
                console.error('Inside 갤러리 초기화 실패:', error);
                new InsideGalleryController([], 'inside-gallery-section');
                return true;
            }
        }
        return false;
    };

    // 즉시 확인
    if (!(await initWhenReady())) {
        // 주기적 확인
        const checkReady = setInterval(async () => {
            if (await initWhenReady()) {
                clearInterval(checkReady);
            }
        }, 100);
        
        // 타임아웃 설정 (5초 후 강제 초기화)
        setTimeout(() => {
            clearInterval(checkReady);
            console.warn('YPP Config 로드 대기 시간 초과, 빈 갤러리로 초기화');
            new InsideGalleryController([], 'inside-gallery-section');
        }, 5000);
    }
});
</script>

<style>
/* ===== INSIDE PAGE SPECIFIC STYLES ===== */

/* Content Section */
.content-section {
    padding: 3rem 0;
    background-color: var(--white, #ffffff);
}

.content-block{border: none;}
.content-block:hover{box-shadow: none;}

/* ===========================
    Gallery Components
=========================== */

/* Gallery Container */
.gallery-container {width: 100%;}
/* Gallery Grid */
.gallery-grid {display: grid;grid-template-columns: repeat(4, 1fr);gap: 20px;margin-bottom: 40px;}
/* Gallery Fake Item */
.gallery-fake-item{aspect-ratio: 4/3;overflow: hidden;background: #f5f5f5; border-radius: 8px;}
/* Gallery Item */
.gallery-item {position: relative;cursor: pointer;border-radius: 8px;overflow: hidden;transition: transform 0.3s ease, box-shadow 0.3s ease;}
.gallery-item:hover {transform: translateY(-5px);box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);}
/* Gallery Thumbnail */
.gallery-thumbnail {position: relative;width: 100%;aspect-ratio: 4/3;overflow: hidden;background: #f5f5f5;}
.gallery-thumbnail img {width: 100%;height: 100%;object-fit: cover;transition: transform 0.3s ease;}
.gallery-item:hover .gallery-thumbnail img {transform: scale(1.05);}
/* Gallery Overlay */
.gallery-overlay {
    display: flex;align-items: center;justify-content: center;
    position: absolute;top: 0;bottom: 0;left: 0;right: 0;
    background: rgba(0, 0, 0, 0.7);padding: 20px;opacity: 0;transition: opacity 0.3s ease;}
.gallery-item:hover .gallery-overlay {opacity: 1;}
.gallery-info h4,
.gallery-info p{color: #fff; text-align: center;}
.gallery-info h4 {font-size: 14px;font-weight: 600;margin: 0 0 5px 0;line-height: 1.3;}
.gallery-info p {font-size: 12px;margin: 0;opacity: 0.9;}
/* Pagination */
